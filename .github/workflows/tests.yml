name: Tests

on:
  push:
    branches: [ main, DLP, develop ]
  pull_request:
    branches: [ main, DLP, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
        
    name: Python ${{ matrix.python-version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev]"

      - name: Lint with Flake8
        continue-on-error: true
        run: |
          pip install flake8
          # Stop the build if there are Python syntax errors or undefined names
          flake8 dlp --count --select=E9,F63,F7,F82 --show-source --statistics
          # Treat all warnings as errors in strict mode
          flake8 dlp --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

      - name: Run tests with pytest
        run: |
          pytest dlp/tests/ -v --cov=dlp --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: true

  lint:
    runs-on: ubuntu-latest
    name: Code Quality (Black, isort, Type Check)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black isort mypy types-PyYAML

      - name: Check formatting with Black
        run: black dlp --check --diff

      - name: Check import sorting with isort
        run: isort dlp --check-only --diff

      - name: Type check with mypy
        continue-on-error: true
        run: mypy dlp --ignore-missing-imports

  integration-test:
    runs-on: ubuntu-latest
    name: Integration Tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run integration tests
        run: |
          pytest dlp/tests/test_integration.py -v --tb=short
