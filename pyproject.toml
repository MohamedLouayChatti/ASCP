[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ascp"
version = "0.1.0"
description = "Security SDK for tool-using LLM agents with Layer B typed capability contracts and MCP integration."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.111.0",
    "uvicorn[standard]>=0.29.0",
    "httpx>=0.27.0",
    "langchain==1.2.13",
    "langchain-openai>=0.1.0",
    "langchain-ollama>=0.1.0",
    "langgraph>=0.1.0",
    "openai>=1.30.0",
    "pydantic>=2.7.0",
    "pydantic-settings>=2.2.0",
    "jsonschema>=4.22.0",
    "pyyaml>=6.0.1",
    "python-dotenv>=1.0.1",
    "aiosqlite>=0.20.0",
    "databases[aiosqlite]>=0.9.0",
    "presidio-analyzer>=2.2.354",
    "presidio-anonymizer>=2.2.354",
    "spacy>=3.7.0",
    "structlog>=24.1.0",
    "tenacity>=8.3.0",
    "anyio>=4.3.0",
    "slowapi>=0.1.9",
    "limits>=3.12.0",
    "requests>=2.32.5",
    "mcp>=1.26.0",
    "opentelemetry-api>=1.28.0",
    "opentelemetry-sdk>=1.28.0",
    "langwatch>=0.3.12",
    "pytest-cov>=7.1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.2.0",
    "pytest-asyncio>=0.23.6",
    "pytest-cov>=5.0.0",
    "httpx>=0.27.0",
    "ruff>=0.4.4",
    "mypy>=1.10.0",
    "pre-commit>=3.7.0",
]
nlp = [
    "en-core-web-sm @ https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-3.7.1/en_core_web_sm-3.7.1-py3-none-any.whl",
]
postgres = [
    "asyncpg>=0.29.0",
    "databases[asyncpg]>=0.9.0",
]

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["Dockerfile"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-v --cov=ascp --cov=apps --cov=security --cov=eval --cov-report=term-missing"

[tool.hatch.build.targets.wheel]
packages = ["apps", "security", "eval"]
include = ["ascp.py", "layer_b.py"]

[tool.hatch.metadata]
allow-direct-references = true
